services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: chat
      POSTGRES_DB: chat
    ports:
      - "5432:5432"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "host=postgres user=chat password=chat dbname=chat"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080 || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 10

  client:
    build: ./client
    environment:
      SERVER_HOST: "server"
    depends_on:
      server:
        condition: service_healthy
    stdin_open: true
    tty: true

volumes:
  pgdata: